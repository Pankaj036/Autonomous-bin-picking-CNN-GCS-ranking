# =============================================================================
#  ur10_joint_limits_binpicking.yaml
#  UR10 Joint Limits — Bin-Picking Workspace (CAS-GCS)
#  =============================================================================
#
#  Source hardware limits (UR10 CB3, Polyscope 3.15.8):
#    shoulder pan/lift : velocity=2.094 rad/s (120°/s),  effort=330 Nm
#    elbow             : velocity=3.141 rad/s (180°/s),  effort=150 Nm
#    wrist 1/2/3       : velocity=3.141 rad/s (180°/s),  effort=56  Nm
#
#  Applied scaling (from main_robot.py):
#    ARM_MAX_VEL_SCALE = 0.10  →  10% of hardware max
#    ARM_MAX_ACC_SCALE = 0.15  →  15% of hardware max
#
#  Workspace position limits tightened for bin-picking reach envelope:
#    shoulder_pan  : ±150°   (full 360° not needed, avoids self-collision)
#    shoulder_lift : -180° to 0°  (arm stays above table)
#    elbow         : 0° to +180° (forward reach only)
#    wrist joints  : ±180°   (reduced from ±360°)
# =============================================================================

joint_limits:

  shoulder_pan_joint:
    has_position_limits: true
    min_position:  -2.618   #  -150 deg  (hardware: -360 deg)
    max_position:   2.618   #  +150 deg
    has_velocity_limits: true
    max_velocity:   0.209   #  12 deg/s  (10% of 120 deg/s hardware max)
    has_acceleration_limits: true
    max_acceleration: 0.314  #  18 deg/s² (15% of ~120 deg/s²)
    has_effort_limits: true
    max_effort: 330.0

  shoulder_lift_joint:
    has_position_limits: true
    min_position:  -3.142   #  -180 deg  (arm above table plane)
    max_position:   0.0     #    0 deg
    has_velocity_limits: true
    max_velocity:   0.209   #  12 deg/s
    has_acceleration_limits: true
    max_acceleration: 0.314
    has_effort_limits: true
    max_effort: 330.0

  elbow_joint:
    has_position_limits: true
    min_position:  -3.142   #  -180 deg
    max_position:   3.142   #  +180 deg  (kept at ±180 per ROS-Industrial recommendation)
    has_velocity_limits: true
    max_velocity:   0.314   #  18 deg/s  (10% of 180 deg/s hardware max)
    has_acceleration_limits: true
    max_acceleration: 0.471  #  27 deg/s² (15% of ~180 deg/s²)
    has_effort_limits: true
    max_effort: 150.0

  wrist_1_joint:
    has_position_limits: true
    min_position:  -3.142   #  -180 deg  (reduced from ±360)
    max_position:   3.142   #  +180 deg
    has_velocity_limits: true
    max_velocity:   0.314   #  18 deg/s
    has_acceleration_limits: true
    max_acceleration: 0.471
    has_effort_limits: true
    max_effort: 56.0

  wrist_2_joint:
    has_position_limits: true
    min_position:  -3.142   #  -180 deg
    max_position:   3.142   #  +180 deg
    has_velocity_limits: true
    max_velocity:   0.314   #  18 deg/s
    has_acceleration_limits: true
    max_acceleration: 0.471
    has_effort_limits: true
    max_effort: 56.0

  wrist_3_joint:
    has_position_limits: true
    min_position:  -3.142   #  -180 deg
    max_position:   3.142   #  +180 deg
    has_velocity_limits: true
    max_velocity:   0.314   #  18 deg/s
    has_acceleration_limits: true
    max_acceleration: 0.471
    has_effort_limits: true
    max_effort: 56.0
